<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisibleData — The world, redrawn by what actually matters.</title>
<!-- Google tag (gtag.js) -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #22223a;
    --text: #e8e8f0; --muted: #6b6b8a; --country-hover: #2a2a42;
  }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
  #map { position: absolute; inset: 0; background: var(--bg) !important; z-index: 0; }
  .leaflet-tile-pane { display: none; }
  .leaflet-control-attribution, .leaflet-control-zoom { display: none; }
  .leaflet-interactive { cursor: grab !important; }

  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    background: linear-gradient(to bottom, rgba(10,10,15,0.98) 60%, transparent);
    pointer-events: none;
  }
  #logo { pointer-events: all; display: flex; flex-direction: column; gap: 2px; }
  #logo h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--text); line-height: 1; }
  #logo p  { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; }

  #topbar-center { pointer-events: all; display: flex; gap: 6px; align-items: center; }
  .mode-btn {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 8px 16px; border-radius: 3px; border: 1px solid var(--border);
    background: rgba(18,18,26,0.85); color: var(--muted); cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px);
  }
  .mode-btn:hover { border-color: var(--text); color: var(--text); }
  .mode-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
  #reset-btn { color: #ff6b6b !important; border-color: #ff6b6b44 !important; margin-left: 6px; }
  #reset-btn:hover { border-color: #ff6b6b !important; }

  #search-wrap { pointer-events: all; position: relative; width: 220px; }
  #search {
    width: 100%; background: rgba(18,18,26,0.9); border: 1px solid var(--border); border-radius: 3px;
    padding: 8px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; backdrop-filter: blur(8px); transition: border-color 0.2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: #4ecdc4; }
  #autocomplete {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: rgba(18,18,26,0.97); border: 1px solid var(--border); border-radius: 3px;
    max-height: 200px; overflow-y: auto; display: none; backdrop-filter: blur(12px); z-index: 2000;
  }
  .ac-item { padding: 9px 14px; font-size: 13px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border); }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: var(--country-hover); }

  /* INFO PANEL — Syne for editorial body text */
  #info-panel {
    position: absolute; top: 80px; left: 28px; z-index: 1000;
    width: 272px; max-height: 172px;
    background: rgba(10,10,18,0.92); border: 1px solid var(--border);
    border-radius: 5px; backdrop-filter: blur(16px);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #info-panel-header {
    padding: 8px 14px 7px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #info-panel-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 3px; color: var(--text);
  }
  #info-panel-body {
    padding: 10px 14px 12px; overflow-y: auto; flex: 1;
    font-family: 'Syne', sans-serif; font-size: 11.5px; font-weight: 400;
    letter-spacing: 0.2px; line-height: 1.65; color: #7a7a9a;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #info-panel-body::-webkit-scrollbar { width: 4px; }
  #info-panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #info-panel-body p { margin-bottom: 8px; }
  #info-panel-body p:last-child { margin-bottom: 0; }
  #info-panel-body strong { color: #c8c8e0; font-weight: 600; letter-spacing: 0.3px; }

  /* CHIPS */
  #chips { position: absolute; top: 80px; right: 28px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; max-width: 220px; }
  .chip {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 7px 12px; border-radius: 3px; font-size: 12px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px; backdrop-filter: blur(8px); animation: chipIn 0.2s ease;
  }
  @keyframes chipIn { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:translateX(0); } }
  .chip-name { font-weight: 500; }
  .chip-val  { font-size: 10px; opacity: 0.75; }
  .chip-x    { cursor: pointer; opacity: 0.6; font-size: 14px; line-height: 1; flex-shrink: 0; }
  .chip-x:hover { opacity: 1; }

  /* TOOLTIP */
  #tooltip {
    position: absolute; z-index: 2000; background: rgba(12,12,20,0.95); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 14px; pointer-events: none; display: none;
    backdrop-filter: blur(12px); min-width: 160px;
  }
  #tooltip .tt-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--text); line-height: 1; margin-bottom: 4px; }
  #tooltip .tt-val  { font-family: 'DM Mono', monospace; font-size: 11px; color: #4ecdc4; letter-spacing: 1px; }
  #tooltip .tt-rank { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }

  #drag-hint {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    z-index: 1000; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px;
    color: var(--muted); background: rgba(12,12,20,0.8); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 3px; pointer-events: none; opacity: 0; transition: opacity 0.4s;
  }
  #drag-hint.show { opacity: 1; }
  #drag-banner {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
    z-index: 1500; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 2px;
    color: #4ecdc4; background: rgba(12,12,20,0.95); border: 1px solid #4ecdc488;
    padding: 10px 22px; border-radius: 4px; pointer-events: none;
    backdrop-filter: blur(12px); text-transform: uppercase; font-weight: 500;
    box-shadow: 0 0 20px rgba(78,205,196,0.15);
    animation: pulseBanner 2s ease-in-out infinite;
  }
  #drag-banner.hidden { display: none; }
  @keyframes pulseBanner {
    0%, 100% { box-shadow: 0 0 20px rgba(78,205,196,0.15); }
    50%      { box-shadow: 0 0 30px rgba(78,205,196,0.35); }
  }

  #fact-banner {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 1000; background: rgba(12,12,20,0.92); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px 20px; font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1px; color: var(--muted); max-width: 520px;
    text-align: center; backdrop-filter: blur(12px); opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  #fact-banner.show { opacity: 1; }

  /* MAX WARNING */
  #max-warning {
    position: absolute; top: 72px; left: 50%; transform: translateX(-50%);
    z-index: 3000; background: rgba(30,8,8,0.97); border: 1px solid #ff6b6b88;
    border-radius: 4px; padding: 10px 22px; font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1px; color: #ff6b6b;
    text-align: center; backdrop-filter: blur(12px); opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  #max-warning.show { opacity: 1; }

  #footer {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    z-index: 1000; font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 1.5px; color: var(--border); text-transform: uppercase; pointer-events: none;
  }

  .country-label {
    font-family: 'DM Mono', monospace; font-weight: 500;
    fill: rgba(90,90,122,0.75); text-anchor: middle; dominant-baseline: middle;
    pointer-events: none; letter-spacing: 0.4px; text-transform: uppercase; user-select: none;
  }

  #loading {
    position: absolute; inset: 0; z-index: 9999; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity 0.5s;
  }
  #loading h2 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 8px; color: var(--text); }
  #loading p  { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: #4ecdc4; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MOBILE OPTIMIZATIONS */
  @media (max-width: 768px) {
    /* Hide info panel completely on mobile */
    #info-panel { display: none !important; }

    /* Compact topbar */
    #topbar {
      padding: 10px 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Smaller logo */
    #logo h1 { font-size: 22px; letter-spacing: 2px; }
    #logo p  { font-size: 8px; letter-spacing: 1px; }

    /* Mode buttons: scrollable horizontal row */
    #topbar-center {
      order: 3;
      width: 100%;
      overflow-x: auto;
      flex-wrap: nowrap;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #topbar-center::-webkit-scrollbar { display: none; }
    .mode-btn {
      font-size: 10px;
      padding: 6px 10px;
      letter-spacing: 1px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* Search shrinks */
    #search-wrap { width: 130px; }
    #search { font-size: 12px; padding: 6px 10px; }

    /* Chips: collapse to compact pills, top-right */
    #chips {
      top: auto;
      bottom: 70px;
      right: 8px;
      left: 8px;
      max-width: none;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
    }
    .chip {
      padding: 4px 8px;
      font-size: 10px;
      gap: 6px;
    }
    .chip-name { font-size: 10px; }
    .chip-val  { display: none; }  /* hide values on mobile to save space */
    .chip-x    { font-size: 12px; }

    /* Tooltip smaller */
    #tooltip { padding: 7px 10px; min-width: 120px; }
    #tooltip .tt-name { font-size: 14px; }
    #tooltip .tt-val  { font-size: 10px; }
    #tooltip .tt-rank { font-size: 9px; }

    /* Fact banner: smaller, doesn't overlap chips */
    #fact-banner {
      bottom: 18px;
      font-size: 9px;
      padding: 8px 14px;
      max-width: 92%;
      letter-spacing: 0.5px;
    }

    /* Drag banner: smaller on mobile */
    #drag-banner {
      top: 64px;
      font-size: 10px;
      padding: 7px 14px;
      letter-spacing: 1px;
      max-width: 92%;
      text-align: center;
    }

    /* Drag hint */
    #drag-hint { bottom: 90px; font-size: 9px; }

    /* Footer hidden on mobile */
    #footer { display: none; }

    /* Max warning */
    #max-warning {
      top: 120px;
      font-size: 9px;
      padding: 8px 14px;
      letter-spacing: 0.5px;
      white-space: normal;
      max-width: 90%;
    }
  }

  /* Extra small phones */
  @media (max-width: 380px) {
    #logo h1 { font-size: 18px; }
    #search-wrap { width: 100px; }
    .mode-btn { font-size: 9px; padding: 5px 8px; }
  }
</style>
</head>
<body>

<div id="loading">
  <h2>VISIBLEDATA</h2>
  <div class="spinner"></div>
  <p>Loading world data...</p>
</div>

<div id="map"></div>

<div id="topbar">
  <div id="logo">
    <h1>VISIBLEDATA</h1>
    <p>The world, redrawn by what actually matters.</p>
  </div>
  <div id="topbar-center">
    <button class="mode-btn active" data-mode="truesize">True Size</button>
    <button class="mode-btn" data-mode="population">Population</button>
    <button class="mode-btn" data-mode="density">Density</button>
    <button class="mode-btn" data-mode="emissions">CO₂</button>
    <button class="mode-btn" data-mode="oil">Oil</button>
    <button class="mode-btn" id="reset-btn">↺ Reset</button>
  </div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Add a country..." autocomplete="off"/>
    <div id="autocomplete"></div>
  </div>
</div>

<div id="info-panel">
  <div id="info-panel-header"><div id="info-panel-title"></div></div>
  <div id="info-panel-body"></div>
</div>

<div id="chips"></div>
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-val"  id="tt-val"></div>
  <div class="tt-rank" id="tt-rank"></div>
</div>
<div id="drag-hint">DRAG TO COMPARE</div>
<div id="drag-banner">↔ Drag selected countries to see their true size</div>
<div id="fact-banner"></div>
<div id="max-warning">6 country max — remove a country to add another</div>
<div id="footer">Data: Natural Earth · UN 2023 · Global Carbon Project · OPEC · visibledata.org</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const COLORS = ['#ff6b6b','#4ecdc4','#ffe66d','#a78bfa','#f97316','#34d399'];
const MAX_SELECTED = 6;

const MODE_DEFAULTS = {
  truesize:   ['GRL','RUS','AUS','CAN'],
  population: ['CHN','IND','USA','NGA','IDN'],
  density:    ['BGD','KOR','NLD','IND','NGA'],
  emissions:  ['CHN','USA','IND','RUS','DEU'],
  oil:        ['VEN','SAU','CAN','IRN','IRQ']
};

const SCALE_ANCHORS = {
  population: { scale: 4.0,  dataKey: 'population', anchorMinArea: 0,    useSqrt: false },
  density:    { scale: 8.0,  dataKey: 'density',    anchorMinArea: 5000, useSqrt: true  },
  emissions:  { scale: 3.0,  dataKey: 'emissions',  anchorMinArea: 0,    useSqrt: false },
  oil:        { scale: 3.0,  dataKey: 'oil',        anchorMinArea: 0,    useSqrt: false }
};

// Microstates + small island nations excluded from density mode
const DENSITY_EXCLUDE = new Set([
  'MCO','SMR','VAT','LIE','AND','MLT','SGP','BHR','MDV','MUS','COM','CPV',
  'STP','TLS','BRN','NRU','TUV','PLW','MHL','KIR','WSM','TON','VUT','FSM',
  'ATG','BRB','DMA','GRD','KNA','LCA','VCT','TTO','JAM','BHS','CUB',
  'HTI','DOM','PRI','TCA','AIA','BMU','CYM','MSR','VGB','VIR','CUW',
  'ABW','SXM','BES','GLP','MTQ',
  'FJI','SLB','NCL','PYF','GUM','ASM','COK','NIU','TKL','PCN','WLF',
  'REU','MYT','SHN','SPM','GIB','IMN','JEY','GGY','FRO','ALA','MAC','HKG'
]);

const INFO_COPY = {
  truesize: {
    title: 'TRUE SIZE',
    body: `<p>Most world maps use the <strong>Mercator projection</strong>, which stretches land near the poles. Greenland looks the size of Africa, but Africa is actually <strong>14x larger</strong>.</p><p>This view shows countries at their real geographic area. Russia is enormous, at <strong>17 million km²</strong>. Greenland shrinks to its true self. <strong>Drag any country</strong> to compare it side-by-side with another region.</p>`
  },
  population: {
    title: 'POPULATION',
    body: `<p>Each country resized by <strong>how many people live there</strong>. China and India each hold over <strong>1.4 billion people</strong>. Together that's more than a third of all humanity.</p><p>Russia, Canada, and Australia, vast land with few people, collapse. <strong>South Asia and West Africa</strong> dominate the map.</p>`
  },
  density: {
    title: 'POPULATION DENSITY',
    body: `<p>Resized by <strong>people per km²</strong>. Bangladesh, the densest large nation on Earth at <strong>1,265 per km²</strong>, anchors the scale.</p><p>Mongolia, Australia, and Canada nearly vanish. The Netherlands and South Korea swell dramatically. Density drives infrastructure costs and political power in ways <strong>raw population misses</strong>.</p>`
  },
  emissions: {
    title: 'CO₂ EMISSIONS',
    body: `<p>Resized by annual <strong>CO₂ output in million tonnes</strong>. China alone emits more than the entire Western world, at <strong>11,000 Mt per year</strong>. The USA is second at <strong>4,700 Mt</strong>.</p><p>Sub-Saharan Africa nearly disappears, having contributed almost nothing to historical climate change while being <strong>the most vulnerable</strong> to its effects.</p>`
  },
  oil: {
    title: 'OIL RESERVES',
    body: `<p>Resized by <strong>proven reserves in billion barrels</strong>, meaning oil underground, not production. Venezuela leads at <strong>304 bn bbl</strong>. Canada's <strong>170 bn bbl</strong> are mostly costly oil sands.</p><p>The Middle East, including Saudi Arabia, Iraq, Iran, and Kuwait, controls the world's <strong>cheapest accessible oil</strong>. Most of Europe and East Asia all but vanish.</p>`
  }
};

const MODES = {
  truesize:   { fact:"Mercator maps make Greenland look the size of Africa. It's actually 14× smaller.",   format: v => v ? Math.round(v).toLocaleString()+' km²'   : 'Extremely low to 0', rankKey:'rank_area',      rankLabel:'by area'          },
  population: { fact:"India surpassed China as the world's most populous country in 2023.",                format: v => v ? v.toLocaleString()+' people'             : 'Extremely low to 0', rankKey:'rank_population', rankLabel:'by population'    },
  density:    { fact:"Bangladesh fits the population of Russia into an area the size of Iowa.",            format: v => v ? v.toLocaleString()+' ppl/km²'            : 'Extremely low to 0', rankKey:'rank_density',    rankLabel:'by density'       },
  emissions:  { fact:"China, the USA and India together emit over half of all global CO₂.",               format: v => v ? v.toLocaleString()+' Mt CO₂'             : 'Extremely low to 0', rankKey:'rank_emissions',  rankLabel:'by CO₂ emissions' },
  oil:        { fact:"Venezuela holds the largest proven oil reserves on Earth — more than Saudi Arabia.", format: v => v ? v.toLocaleString()+' bn barrels'         : 'Extremely low to 0', rankKey:'rank_oil',        rankLabel:'by oil reserves'  }
};

// ══════════════════════════════════════════════
// BLOCKED features
// ══════════════════════════════════════════════
const NAME_BLOCKLIST = new Set([
  'Scarborough Reef','Bir Tawil','Siachen Glacier','Aksai Chin'
]);

// ══════════════════════════════════════════════
// KEY HELPER
// ══════════════════════════════════════════════
function featureKey(feature) {
  const iso = feature.properties['ISO3166-1-Alpha-3'] || '';
  if (iso && iso !== '-99') return iso;
  const name = feature.properties.name || feature.properties.NAME || '';
  return name ? 'name:' + name : null;
}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentMode = 'truesize';
let geoData = null;
let selectedCountries = [];
let countryLayers = {};
let countryMeta = {};
let map = null;
let scaledLayers = null;
let scaledFeaturesMap = {};
let labelLayer = null;
let labelData = [];

let dragLayer = null;
let dragISO = null;
let dragStartLatLng = null;
let dragCurrentLatLng = null;
let dragOriginGeom = null;
let isDragging = false;
let dragOriginCentroid = null;

let maxWarnTimer = null;

// ══════════════════════════════════════════════
// INIT MAP
// ══════════════════════════════════════════════
function initMap() {
  map = L.map('map', {
    center: [20, 0], zoom: 2, minZoom: 1.5, maxZoom: 6,
    zoomControl: false, attributionControl: false,
    worldCopyJump: false, maxBounds: [[-90,-200],[90,200]]
  });
}

// ══════════════════════════════════════════════
// LOAD DATA
// ══════════════════════════════════════════════
async function loadData() {
  const [geoResp, popResp, emResp, oilResp, denResp, areaResp] = await Promise.all([
    fetch('countries.geojson'),
    fetch('population.json'),
    fetch('emissions.json'),
    fetch('oilreserves.json'),
    fetch('density.json'),
    fetch('area.json')
  ]);
  geoData    = await geoResp.json();
  const popArr  = await popResp.json();
  const emArr   = await emResp.json();
  const oilArr  = await oilResp.json();
  const denArr  = await denResp.json();
  const areaArr = await areaResp.json();

  const popByName = {};
  for (const e of popArr) {
    if (e.country && e.population) popByName[e.country.toLowerCase()] = parseInt(e.population);
  }
  const aliases = {
    'united states of america':'united states','bolivia':'bolivia, plurinational state of',
    'iran':'iran, islamic republic of','syria':'syrian arab republic',
    'tanzania':'tanzania, united republic of','south korea':'korea, republic of',
    'north korea':"korea, democratic people's republic of","laos":"lao people's democratic republic",
    'vietnam':'viet nam','moldova':'moldova, republic of','venezuela':'venezuela, bolivarian republic of',
    'democratic republic of the congo':'congo, the democratic republic of the',
    'republic of the congo':'congo',"ivory coast":"côte d'ivoire"
  };
  for (const [g,p] of Object.entries(aliases)) { if (popByName[p]) popByName[g] = popByName[p]; }

  const emByISO   = {}; for (const e of emArr)   { if (e.iso && e.emissions!=null) emByISO[e.iso]   = parseFloat(e.emissions); }
  const oilByISO  = {}; for (const e of oilArr)  { if (e.iso && e.reserves!=null)  oilByISO[e.iso]  = parseFloat(e.reserves);  }
  const denByISO  = {}; for (const e of denArr)  { if (e.iso && e.density!=null)   denByISO[e.iso]  = parseFloat(e.density);   }
  const areaByISO = {}; for (const e of areaArr) { if (e.iso && e.area!=null)      areaByISO[e.iso] = parseFloat(e.area);      }

  for (const feat of geoData.features) {
    const p    = feat.properties;
    const name = p.name || p.ADMIN || p.NAME || '';
    const iso  = (p['ISO3166-1-Alpha-3'] || '');
    const key  = featureKey(feat);
    if (!key) continue;
    if (NAME_BLOCKLIST.has(name)) continue;
    const realISO = (iso && iso !== '-99') ? iso : null;
    countryMeta[key] = {
      name, iso: key, realISO,
      area:       areaByISO[realISO]  || 0,
      population: popByName[name.toLowerCase()] || 0,
      emissions:  emByISO[realISO]    || 0,
      oil:        oilByISO[realISO]   || 0,
      density:    denByISO[realISO]   || 0
    };
  }

  const rankBy = key => {
    Object.values(countryMeta).filter(c => c[key] > 0)
      .sort((a,b) => b[key]-a[key])
      .forEach((c,i) => { countryMeta[c.iso]['rank_'+key] = i+1; });
  };
  rankBy('population'); rankBy('area'); rankBy('emissions'); rankBy('oil'); rankBy('density');

  const MIN_AREA = 500;
  for (const feat of geoData.features) {
    const key  = featureKey(feat);
    if (!key) continue;
    const meta = countryMeta[key];
    if (!meta) continue;
    if ((meta.area || 0) < MIN_AREA && !['FRA','NOR'].includes(meta.realISO)) continue;
    const c = getCentroid(feat.geometry);
    if (!c) continue;
    let label = meta.name;
    if      (label === 'United States of America')         label = 'USA';
    else if (label === 'United Kingdom')                   label = 'UK';
    else if (label === 'Democratic Republic of the Congo') label = 'DR Congo';
    else if (label === 'Central African Republic')         label = 'C.A.R.';
    else if (label === 'Bosnia and Herzegovina')           label = 'Bosnia';
    else if (label === 'Trinidad and Tobago')              label = 'T&T';
    else if (label === 'Dominican Republic')               label = 'Dom. Rep.';
    else if (label.length > 18) label = label.split(' ').slice(0,2).join(' ');
    labelData.push({ iso: key, name: label, geoCentroid: c });
  }
}

// ══════════════════════════════════════════════
// GEOMETRY HELPERS
// ══════════════════════════════════════════════
function getCentroid(geometry) {
  if (geometry.type === 'MultiPolygon') {
    let bestPoly = geometry.coordinates[0];
    let bestArea = 0;
    for (const poly of geometry.coordinates) {
      const localPts = [];
      (function lc(c) { if (typeof c[0]==='number'){localPts.push(c);return;} c.forEach(lc); })(poly);
      if (!localPts.length) continue;
      const lngs = localPts.map(p=>p[0]), lats = localPts.map(p=>p[1]);
      const area = (Math.max(...lngs)-Math.min(...lngs)) * (Math.max(...lats)-Math.min(...lats));
      if (area > bestArea) { bestArea = area; bestPoly = poly; }
    }
    const coords = [];
    (function lc(c) { if (typeof c[0]==='number'){coords.push(c);return;} c.forEach(lc); })(bestPoly);
    if (!coords.length) return null;
    const lngs = coords.map(c=>c[0]), lats = coords.map(c=>c[1]);
    return [(Math.min(...lngs)+Math.max(...lngs))/2, (Math.min(...lats)+Math.max(...lats))/2];
  }
  const coords = [];
  (function lc(c) { if (typeof c[0]==='number'){coords.push(c);return;} c.forEach(lc); })(geometry.coordinates);
  if (!coords.length) return null;
  const lngs = coords.map(c=>c[0]), lats = coords.map(c=>c[1]);
  return [(Math.min(...lngs)+Math.max(...lngs))/2, (Math.min(...lats)+Math.max(...lats))/2];
}

function scaleGeometryPixel(geometry, scale) {
  const c = getCentroid(geometry); if (!c) return geometry;
  const cPx = map.project([c[1],c[0]],0);
  function sp([lng,lat]) {
    const px = map.project([lat,lng],0);
    const ll = map.unproject(L.point(cPx.x+(px.x-cPx.x)*scale, cPx.y+(px.y-cPx.y)*scale),0);
    return [ll.lng,ll.lat];
  }
  const sr = ring => ring.map(sp);
  if (geometry.type==='Polygon')      return {type:'Polygon',     coordinates:geometry.coordinates.map(sr)};
  if (geometry.type==='MultiPolygon') return {type:'MultiPolygon',coordinates:geometry.coordinates.map(p=>p.map(sr))};
  return geometry;
}

function reprojectToCentroid(geometry, orig, newC) {
  const R=6378137, oRad=orig[1]*Math.PI/180, nRad=newC[1]*Math.PI/180;
  function mp([lng,lat]) {
    const dx=(lng-orig[0])*Math.PI/180*R*Math.cos(oRad), dy=(lat-orig[1])*Math.PI/180*R;
    return [newC[0]+(dx/(R*Math.cos(nRad)))*180/Math.PI, newC[1]+(dy/R)*180/Math.PI];
  }
  const sr = ring => ring.map(mp);
  if (geometry.type==='Polygon')      return {type:'Polygon',     coordinates:geometry.coordinates.map(sr)};
  if (geometry.type==='MultiPolygon') return {type:'MultiPolygon',coordinates:geometry.coordinates.map(p=>p.map(sr))};
  return geometry;
}

// ══════════════════════════════════════════════
// LABEL LAYER
// ══════════════════════════════════════════════
function buildLabelLayer() {
  return new (L.Layer.extend({
    onAdd(m) {
      this._map = m;
      this._svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      this._svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:450;';
      m.getPane('overlayPane').appendChild(this._svg);
      this._draw();
      m.on('moveend zoomend', this._draw, this);
    },
    onRemove(m) { this._svg.remove(); m.off('moveend zoomend', this._draw, this); },
    _draw() {
      while (this._svg.firstChild) this._svg.firstChild.remove();
      const zoom = this._map.getZoom();
      if (zoom < 1.7) return;
      const fs = Math.max(7, Math.min(12, 6.5 + (zoom-2)*1.8));
      const sz = this._map.getSize();
      for (const {iso, name, geoCentroid} of labelData) {
        let ll = geoCentroid;
        if (currentMode !== 'truesize' && scaledFeaturesMap[iso]) {
          const sc = getCentroid(scaledFeaturesMap[iso]);
          if (sc) ll = sc;
        }
        const pt = this._map.latLngToLayerPoint([ll[1], ll[0]]);
        if (pt.x < -60 || pt.y < -60 || pt.x > sz.x+60 || pt.y > sz.y+60) continue;
        const sel = selectedCountries.find(s => s.iso === iso);
        const t   = document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x', pt.x);
        t.setAttribute('y', pt.y);
        t.setAttribute('class','country-label');
        t.style.fontSize = fs+'px';
        if (sel) { t.style.fill = sel.color; t.style.opacity = '0.88'; }
        t.textContent = name;
        this._svg.appendChild(t);
      }
    },
    refresh() { this._draw(); }
  }))();
}

function ensureLabels() {
  if (!labelLayer) { labelLayer = buildLabelLayer(); labelLayer.addTo(map); }
}
function refreshLabels() { if (labelLayer) labelLayer.refresh(); }

// ══════════════════════════════════════════════
// STYLES
// ══════════════════════════════════════════════
function baseStyle(key) {
  const sel = selectedCountries.find(s => s.iso === key);
  if (sel) return { fillColor:sel.color, fillOpacity:0.15, color:sel.color, weight:2, opacity:1 };
  return { fillColor:'#8a8aae', fillOpacity:0.13, color:'#6a6a8e', weight:0.9, opacity:1 };
}

function attachLayerEvents(layer, key) {
  layer.on('mouseover', e => { if (!isDragging) showTooltip(e, key); });
  layer.on('mousemove', e => { if (!isDragging) moveTooltip(e); });
  layer.on('mouseout',  () => { if (!isDragging) hideTooltip(key); });
  layer.on('click',     () => { if (!isDragging) selectCountry(key); });
  layer.on('mousedown', e => startDrag(e, key));
}

// ══════════════════════════════════════════════
// RENDER TRUE SIZE
// ══════════════════════════════════════════════
function renderTrueSize() {
  if (scaledLayers) { map.removeLayer(scaledLayers); scaledLayers = null; }
  Object.values(countryLayers).forEach(l => map.removeLayer(l));
  countryLayers = {}; scaledFeaturesMap = {};

  L.geoJSON(geoData, {
    filter: feat => {
      const name = feat.properties.name || '';
      if (NAME_BLOCKLIST.has(name)) return false;
      return true;
    },
    style: feat => baseStyle(featureKey(feat)),
    onEachFeature: (feat, layer) => {
      const key = featureKey(feat);
      if (!key) return;
      countryLayers[key] = layer;
      scaledFeaturesMap[key] = feat.geometry;
      attachLayerEvents(layer, key);
    }
  }).addTo(map);
}

// ══════════════════════════════════════════════
// RENDER SCALED MODE
// ══════════════════════════════════════════════
function renderScaledMode(anchor) {
  Object.values(countryLayers).forEach(l => map.removeLayer(l));
  countryLayers = {};
  if (scaledLayers) { map.removeLayer(scaledLayers); scaledLayers = null; }
  scaledFeaturesMap = {};

  const isDensityMode = anchor.dataKey === 'density';

  const candidates = Object.values(countryMeta).filter(c => {
    if (c[anchor.dataKey] <= 0) return false;
    if ((c.area || 0) < (anchor.anchorMinArea || 0)) return false;
    if (isDensityMode && DENSITY_EXCLUDE.has(c.realISO)) return false;
    return true;
  });
  const anchorValue = candidates.length ? Math.max(...candidates.map(c => c[anchor.dataKey])) : 1;

  const features = [...geoData.features]
    .filter(feat => {
      const name = feat.properties.name || '';
      if (NAME_BLOCKLIST.has(name)) return false;
      const key = featureKey(feat);
      if (!key) return false;
      if (isDensityMode) {
        const meta = countryMeta[key] || {};
        if (meta.realISO && DENSITY_EXCLUDE.has(meta.realISO)) return false;
      }
      return true;
    })
    .sort((a,b) => {
      const ka = featureKey(a), kb = featureKey(b);
      return ((countryMeta[kb]||{})[anchor.dataKey]||0) - ((countryMeta[ka]||{})[anchor.dataKey]||0);
    });

  const scaledFeatures = features.map(feat => {
    const key   = featureKey(feat);
    const value = (countryMeta[key]||{})[anchor.dataKey] || 0;
    let scale;
    if (value <= 0) {
      scale = 0.02;
    } else if (anchor.useSqrt) {
      scale = Math.sqrt(value / anchorValue) * anchor.scale;
    } else {
      scale = (value / anchorValue) * anchor.scale;
    }
    const geoAreaNorm = Math.sqrt((countryMeta[key]||{}).area || 1000000) / Math.sqrt(1000000);
    const sg = scaleGeometryPixel(feat.geometry, scale / geoAreaNorm);
    scaledFeaturesMap[key] = sg;
    return { type:'Feature', properties:feat.properties, geometry:sg };
  });

  scaledLayers = L.geoJSON({ type:'FeatureCollection', features:scaledFeatures }, {
    style: feat => baseStyle(featureKey(feat)),
    onEachFeature: (feat, layer) => {
      const key = featureKey(feat);
      if (!key) return;
      countryLayers[key] = layer;
      attachLayerEvents(layer, key);
    }
  }).addTo(map);
}

// ══════════════════════════════════════════════
// INFO PANEL
// ══════════════════════════════════════════════
function updateInfoPanel(mode) {
  const c = INFO_COPY[mode] || {};
  document.getElementById('info-panel-title').textContent = c.title || mode.toUpperCase();
  document.getElementById('info-panel-body').innerHTML   = c.body  || '';
}

// ══════════════════════════════════════════════
// TOOLTIP
// ══════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');

function getMetricValue(key) {
  const m = countryMeta[key] || {};
  if (currentMode==='truesize')   return m.area;
  if (currentMode==='population') return m.population;
  if (currentMode==='density')    return m.density;
  if (currentMode==='emissions')  return m.emissions;
  if (currentMode==='oil')        return m.oil;
}

function showTooltip(e, key) {
  const meta = countryMeta[key]||{};
  const sel  = selectedCountries.find(s=>s.iso===key);
  const mode = MODES[currentMode];
  document.getElementById('tt-name').textContent = meta.name||key;
  document.getElementById('tt-name').style.color = sel ? sel.color : '#e8e8f0';
  document.getElementById('tt-val').textContent  = mode.format(getMetricValue(key));
  const rank = meta[mode.rankKey];
  document.getElementById('tt-rank').textContent = rank ? `#${rank} ${mode.rankLabel}` : '';
  tooltip.style.display = 'block';
  moveTooltip(e);
  if (!sel && countryLayers[key]) {
    countryLayers[key].setStyle({ fillColor:'#7a7aaa', fillOpacity:0.2, color:'#7a7aaa' });
  }
}

function moveTooltip(e) {
  const x=e.originalEvent.clientX, y=e.originalEvent.clientY;
  const tw=tooltip.offsetWidth, th=tooltip.offsetHeight, vw=window.innerWidth;
  tooltip.style.left = (x+tw+20>vw ? x-tw-10 : x+14)+'px';
  tooltip.style.top  = (y-th/2)+'px';
}

function hideTooltip(key) {
  tooltip.style.display = 'none';
  const sel = selectedCountries.find(s=>s.iso===key);
  if (!sel && countryLayers[key]) {
    countryLayers[key].setStyle({ fillColor:'#8a8aae', fillOpacity:0.13, color:'#6a6a8e' });
  }
}

// ══════════════════════════════════════════════
// MAX WARNING
// ══════════════════════════════════════════════
function showMaxWarning() {
  const w = document.getElementById('max-warning');
  w.classList.add('show');
  clearTimeout(maxWarnTimer);
  maxWarnTimer = setTimeout(() => w.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════
// DRAGGING
// ══════════════════════════════════════════════
function startDrag(e, key) {
  const sel = selectedCountries.find(s=>s.iso===key);
  if (!sel) return;
  if (sel.dragLayer) { map.removeLayer(sel.dragLayer); sel.dragLayer=null; }
  L.DomEvent.stopPropagation(e);
  map.dragging.disable();
  tooltip.style.display = 'none';
  isDragging=true; document.getElementById('drag-banner').classList.add('hidden'); dragISO=key; dragStartLatLng=e.latlng; dragCurrentLatLng=e.latlng;
  dragOriginGeom = sel.lastGeom || scaledFeaturesMap[key];
  if (!dragOriginGeom) { map.dragging.enable(); isDragging=false; return; }
  dragOriginCentroid = getCentroid(dragOriginGeom);
  if (countryLayers[key]) countryLayers[key].setStyle({ fillOpacity:0, opacity:0 });
  dragLayer = L.geoJSON({type:'Feature',geometry:dragOriginGeom,properties:{}},{
    style:{ fillColor:sel.color, fillOpacity:0.15, color:sel.color, weight:2, opacity:1 }
  }).addTo(map);
  dragLayer.bringToFront();
  map.on('mousemove', onDragMove);
  map.on('mouseup', onDragEnd);
  document.addEventListener('mouseup', onDragEnd, {once:true});
}

function computeMovedGeom(og, oc, start, cur) {
  if (currentMode === 'truesize') {
    const sp=map.project(start,0), np=map.project(cur,0);
    const ocp=map.project([oc[1],oc[0]],0);
    const ncll=map.unproject(L.point(ocp.x+(np.x-sp.x), ocp.y+(np.y-sp.y)),0);
    return reprojectToCentroid(og, oc, [ncll.lng, ncll.lat]);
  } else {
    const sp=map.project(start,0), np=map.project(cur,0);
    const dx=np.x-sp.x, dy=np.y-sp.y;
    function sh([lng,lat]) {
      const pt=map.project([lat,lng],0);
      const ll=map.unproject(L.point(pt.x+dx,pt.y+dy),0);
      return [ll.lng,ll.lat];
    }
    const sr=ring=>ring.map(sh);
    return og.type==='Polygon'
      ? {type:'Polygon',     coordinates:og.coordinates.map(sr)}
      : {type:'MultiPolygon',coordinates:og.coordinates.map(p=>p.map(sr))};
  }
}

function onDragMove(e) {
  if (!dragLayer||!dragStartLatLng||!dragOriginCentroid) return;
  dragCurrentLatLng=e.latlng;
  const sel=selectedCountries.find(s=>s.iso===dragISO);
  const moved=computeMovedGeom(dragOriginGeom,dragOriginCentroid,dragStartLatLng,e.latlng);
  dragLayer.clearLayers();
  dragLayer.addData({type:'Feature',geometry:moved,properties:{}});
  dragLayer.setStyle({fillColor:sel.color,fillOpacity:0.15,color:sel.color,weight:2,opacity:1});
  dragLayer.bringToFront();
}

function onDragEnd() {
  map.off('mousemove',onDragMove); map.off('mouseup',onDragEnd); map.dragging.enable();
  if (dragISO && countryLayers[dragISO]) countryLayers[dragISO].setStyle({fillOpacity:0,opacity:0});
  if (dragLayer && dragISO) {
    const sel=selectedCountries.find(s=>s.iso===dragISO);
    if (sel && dragOriginCentroid && dragCurrentLatLng) {
      sel.lastGeom  = computeMovedGeom(dragOriginGeom,dragOriginCentroid,dragStartLatLng,dragCurrentLatLng);
      sel.dragLayer = dragLayer;
      const cKey=dragISO;
      dragLayer.off('mousedown');
      dragLayer.on('mousedown', e=>startDrag(e,cKey));
      dragLayer.on('mouseover', e=>showTooltip(e,cKey));
      dragLayer.on('mousemove', e=>moveTooltip(e));
      dragLayer.on('mouseout',  ()=>hideTooltip(cKey));
    }
    dragLayer=null;
  }
  setTimeout(()=>{ isDragging=false; },50);
  dragISO=null; dragStartLatLng=null; dragCurrentLatLng=null; dragOriginGeom=null; dragOriginCentroid=null;
}

// ══════════════════════════════════════════════
// SELECTION
// ══════════════════════════════════════════════
function selectCountry(key) {
  if (selectedCountries.find(s=>s.iso===key)) return;
  if (selectedCountries.length>=MAX_SELECTED) {
    showMaxWarning();
    return;
  }
  const meta=countryMeta[key]||{};
  const color=COLORS[selectedCountries.length];
  selectedCountries.push({iso:key, name:meta.name||key, color, dragLayer:null, lastGeom:null});
  updateCountryStyle(key,color);
  renderChips(); refreshLabels();
  const hint=document.getElementById('drag-hint');
  hint.classList.add('show'); setTimeout(()=>hint.classList.remove('show'),3000);
}

function deselectCountry(key) {
  const sel=selectedCountries.find(s=>s.iso===key);
  if (sel&&sel.dragLayer) map.removeLayer(sel.dragLayer);
  selectedCountries=selectedCountries.filter(s=>s.iso!==key);
  if (countryLayers[key]) countryLayers[key].setStyle({fillColor:'#8a8aae',fillOpacity:0.13,color:'#6a6a8e',weight:0.9,opacity:1});
  renderChips(); refreshLabels();
}

function updateCountryStyle(key,color) {
  const layer=countryLayers[key]; if (!layer) return;
  if (color) { layer.setStyle({fillColor:color,fillOpacity:0.15,color:color,weight:2,opacity:1}); layer.bringToFront(); }
  else layer.setStyle({fillColor:'#8a8aae',fillOpacity:0.13,color:'#6a6a8e',weight:0.9,opacity:1});
}

// ══════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════
function resetAll() {
  selectedCountries.forEach(s=>{ if(s.dragLayer) map.removeLayer(s.dragLayer); });
  selectedCountries=[];
  renderChips(); renderMode();
  (MODE_DEFAULTS[currentMode]||[]).forEach(iso=>{ if(countryMeta[iso]) selectCountry(iso); });
  renderChips();
}
document.getElementById('reset-btn').addEventListener('click', resetAll);

// ══════════════════════════════════════════════
// CHIPS
// ══════════════════════════════════════════════
function getChipVal(key) {
  const m=countryMeta[key]||{};
  if (currentMode==='truesize')   return m.area       ? Math.round(m.area).toLocaleString()+' km²'  : '';
  if (currentMode==='population') return m.population ? m.population.toLocaleString()+' ppl'         : '';
  if (currentMode==='density')    return m.density    ? m.density.toLocaleString()+' ppl/km²'        : '';
  if (currentMode==='emissions')  return m.emissions  ? m.emissions.toLocaleString()+' Mt CO₂'       : '';
  if (currentMode==='oil')        return m.oil        ? m.oil.toLocaleString()+' bn bbl'             : '';
  return '';
}

function renderChips() {
  const container=document.getElementById('chips'); container.innerHTML='';
  selectedCountries.forEach(({iso,name,color})=>{
    const chip=document.createElement('div');
    chip.className='chip';
    chip.style.cssText=`background:${color}15;border:1px solid ${color}88;color:${color}`;
    chip.innerHTML=`<div><div class="chip-name">${name}</div><div class="chip-val">${getChipVal(iso)}</div></div><span class="chip-x">✕</span>`;
    chip.querySelector('.chip-x').addEventListener('click',()=>deselectCountry(iso));
    container.appendChild(chip);
  });
}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
const searchInput=document.getElementById('search');
const acDropdown =document.getElementById('autocomplete');

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.toLowerCase().trim();
  acDropdown.innerHTML='';
  if (!q){ acDropdown.style.display='none'; return; }
  const matches=Object.values(countryMeta).filter(c=>c.name&&c.name.toLowerCase().includes(q)).slice(0,8);
  if (!matches.length){ acDropdown.style.display='none'; return; }
  matches.forEach(c=>{
    const item=document.createElement('div');
    item.className='ac-item'; item.textContent=c.name;
    item.addEventListener('click',()=>{
      selectCountry(c.iso);
      zoomToCountry(c.iso);
      searchInput.value=''; acDropdown.style.display='none';
    });
    acDropdown.appendChild(item);
  });
  acDropdown.style.display='block';
});
document.addEventListener('click',e=>{ if (!document.getElementById('search-wrap').contains(e.target)) acDropdown.style.display='none'; });

function zoomToCountry(key) {
  const l=countryLayers[key];
  if (l&&l.getBounds) try{ map.fitBounds(l.getBounds(),{padding:[60,60],maxZoom:5}); }catch(e){}
}

// ══════════════════════════════════════════════
// MODE SWITCHING
// ══════════════════════════════════════════════
document.querySelectorAll('.mode-btn[data-mode]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const mode=btn.dataset.mode;
    if (mode===currentMode) return;
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMode=mode;
    document.getElementById('drag-banner').classList.toggle('hidden', mode !== 'truesize');
    showFact(MODES[mode].fact);
    updateInfoPanel(mode);
    selectedCountries.forEach(s=>{ if(s.dragLayer) map.removeLayer(s.dragLayer); });
    selectedCountries=[];
    renderMode();
    (MODE_DEFAULTS[currentMode]||[]).forEach(iso=>{ if(countryMeta[iso]) selectCountry(iso); });
    renderChips();
  });
});

function renderMode() {
  if (currentMode==='truesize') renderTrueSize();
  else renderScaledMode(SCALE_ANCHORS[currentMode]);
  selectedCountries.forEach(({iso,color})=>setTimeout(()=>updateCountryStyle(iso,color),80));
}

// ══════════════════════════════════════════════
// FACT BANNER
// ══════════════════════════════════════════════
let factTimer=null;
function showFact(text) {
  const b=document.getElementById('fact-banner');
  b.textContent=text; b.classList.add('show');
  clearTimeout(factTimer); factTimer=setTimeout(()=>b.classList.remove('show'),5000);
}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
async function boot() {
  initMap();
  await loadData();
  updateInfoPanel('truesize');
  renderTrueSize();
  document.getElementById('loading').style.opacity='0';
  setTimeout(()=>document.getElementById('loading').style.display='none',500);
  MODE_DEFAULTS.truesize.forEach(iso=>{ if(countryMeta[iso]) selectCountry(iso); });
  renderChips();
}

boot().catch(err=>{
  console.error(err);
  document.getElementById('loading').querySelector('p').textContent=
    'Error: ensure countries.geojson, population.json, emissions.json, oilreserves.json, density.json, and area.json are in the same folder.';
});
</script>
</body>
</html>
